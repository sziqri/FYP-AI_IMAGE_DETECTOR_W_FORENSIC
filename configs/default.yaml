# configs/efficientnet_v2.yaml - OPTIMIZED FOR EfficientNetV2-M

# Model Configuration
model: "efficientnet_v2_m"
img_size: 384 # Optimal for EfficientNetV2-M (changed from 380)
num_classes: 2
pretrained: true

# Training Parameters
seed: 42
epochs: 100
batch_size: 8
lr: 5e-5
weight_decay: 1e-4
optimizer: "adamw"
amp: true

# Data Paths
data_dir: "../data"
train_dir: "../data/train"
val_dir: "../data/val" 
test_dir: "../data/test"

# Data Loading
num_workers: 6

# Augmentation (Enhanced for Forensic Tasks)
rand_augment: true
color_jitter: 0.2
hflip_prob: 0.5

pretrained: true

# Forensic Features
use_extras: true
use_fft: true
use_ela: true
use_prnu: true

# Output & Early Stopping
output_dir: "outputs"
early_stopping_patience: 50

# Fine-Tuning Settings
fine_tune_lr: 1.0e-5  # The target Low Learning Rate (0.00001)